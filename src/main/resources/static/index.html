<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>躲猫猫</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="hero">
      <h1>躲猫猫</h1>
      <p>猎人第一人称持枪 · 躲藏者第三人称 · 房间准备开局</p>
    </header>

    <section id="lobby-panel" class="panel">
      <div class="lobby-layout">
        <div class="card">
          <h2>创建房间</h2>
          <label class="field">
            <span>昵称</span>
            <input id="player-name" type="text" maxlength="12" placeholder="输入昵称" value="玩家">
          </label>
          <div class="actions">
            <button id="create-room-btn" class="btn primary">创建房间</button>
          </div>
          <p id="lobby-error" class="error hidden"></p>
        </div>

        <div class="card room-list-card">
          <div class="room-list-header">
            <h2>可加入的房间</h2>
            <button id="refresh-rooms-btn" class="btn ghost">刷新</button>
          </div>
          <p class="room-list-tip">创建房间后会出现在列表中，点击即可加入</p>
          <ul id="room-list" class="room-list">
            <li class="room-list-empty">正在加载房间...</li>
          </ul>

          <details class="room-code-fallback">
            <summary>手动输入房间号</summary>
            <label class="field">
              <span>房间号</span>
              <input id="room-code" type="text" maxlength="4" placeholder="例如 ABCD">
            </label>
            <div class="actions">
              <button id="join-room-btn" class="btn">加入</button>
            </div>
          </details>
        </div>
      </div>
    </section>

    <section id="game-panel" class="panel hidden">
      <div class="toolbar">
        <div class="room-info">
          <span>房间 <strong id="room-id-label">----</strong></span>
          <span id="phase-label">等待中</span>
          <span id="timer-label">--</span>
        </div>
        <div class="toolbar-actions">
          <button id="enter-btn" class="btn primary">进入场景</button>
          <button id="ready-btn" class="btn hidden">准备</button>
          <button id="start-btn" class="btn primary hidden" disabled>开始游戏</button>
          <button id="next-round-btn" class="btn primary hidden" disabled>下一局</button>
          <button id="leave-btn" class="btn ghost">离开</button>
        </div>
      </div>

      <div class="game-layout">
        <div class="canvas-wrap">
          <canvas id="game-canvas"></canvas>
          <div id="crosshair" class="crosshair hidden">+</div>
          <div id="preview-badge" class="preview-badge">场景预览 · 点击「进入场景」加入</div>
          <div id="hint-bar" class="hint-bar">连接中...</div>
        </div>

        <aside class="sidebar">
          <h3>玩家列表 <span id="ready-count" class="ready-count"></span></h3>
          <ul id="player-list"></ul>
          <div class="help">
            <h4>操作说明</h4>
            <ul>
              <li>先「进入场景」再在列表中准备</li>
              <li><strong>躲藏者</strong>：开局随机道具外观，WASD + 空格跳跃，E 切换伪装</li>
              <li><strong>猎人</strong>：伪装阶段在等候室等待，寻找阶段第一人称持枪</li>
              <li>全员准备后房主才能开始</li>
            </ul>
          </div>
        </aside>
      </div>

      <p id="game-error" class="error hidden"></p>
    </section>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="js/game.js"></script>
</body>
</html>
